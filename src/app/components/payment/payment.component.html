<div class="payment-form card">
  <h2>Record Payment</h2>
  <form (ngSubmit)="submitPayment()">
    <div class="form-group">
      <label>Student Record</label>
      <select class="form-control" [(ngModel)]="payment.record" name="record" required>
        <option *ngFor="let r of records" [ngValue]="r.id">{{ r.student_id }} - {{ r.full_name }}</option>
      </select>
    </div>
    <div class="form-group">
      <label>Amount</label>
      <input type="number" class="form-control" [(ngModel)]="payment.amount" name="amount" step="0.01" required>
    </div>
    <div class="form-group">
      <label>Remarks</label>
      <textarea class="form-control" [(ngModel)]="payment.remarks" name="remarks"></textarea>
    </div>
    <button type="submit" class="btn btn-success">Submit Payment</button>
  </form>
</div>
