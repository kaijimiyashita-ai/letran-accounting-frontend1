<div class="dashboard">
  <h2>Dashboard</h2>

  <!-- Financial status cards -->
  <div class="stats-grid">
    <div class="card stat-card">
      <h3>Total Students</h3>
      <p class="stat-number">{{ stats.total_students }}</p>
    </div>
    <div class="card stat-card">
      <h3>Fully Paid</h3>
      <p class="stat-number green">{{ stats.fully_paid }}</p>
    </div>
    <div class="card stat-card">
      <h3>Partial</h3>
      <p class="stat-number orange">{{ stats.partial_paid }}</p>
    </div>
    <div class="card stat-card">
      <h3>Unpaid</h3>
      <p class="stat-number red">{{ stats.unpaid }}</p>
    </div>
  </div>

  <!-- Department cards (clickable) -->
  <h3 style="margin-top: 30px;">Departments</h3>
  <div class="stats-grid">
    <div class="card stat-card clickable" (click)="filterByDepartment('DICS')">
      <h3>DICS</h3>
      <p class="stat-number blue">{{ stats.dics_count }}</p>
    </div>
    <div class="card stat-card clickable" (click)="filterByDepartment('BSBA')">
      <h3>BSBA</h3>
      <p class="stat-number red">{{ stats.bsba_count }}</p>
    </div>
    <div class="card stat-card clickable" (click)="filterByDepartment('BEED')">
      <h3>BEED</h3>
      <p class="stat-number green">{{ stats.beed_count }}</p>
    </div>
  </div>
</div>
